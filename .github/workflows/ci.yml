name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up bash
        uses: stefanzweifel/setup-bash@v1

      - name: Make test scripts executable
        run: |
          chmod +x tests/test_install_dcd.sh || true
          chmod +x tests/test_install_self.sh || true
          chmod +x tests/run_tests.sh || true

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          make lint

      - name: Run tests
        run: |
          ./tests/run_tests.sh
